services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume-bridge-api
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - tempData:/app/tempData
      - storage:/app/storage
      - job_hunter_db:/app/dbdata
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/collections"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  tempData:
  storage:
  qdrant_data:
  job_hunter_db:
