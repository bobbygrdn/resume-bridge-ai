version: '3.8'

services:
  api:
    build: .
    container_name: resume-bridge-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./tempData:/app/tempData
      - ./storage:/app/storage
      - job_hunter_db:/app/job_hunter.db
    depends_on:
      - qdrant
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  job_hunter_db:
